name: 'Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            ffmpeg_target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            ffmpeg_target: 'x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      # Tauri 가 bundle 시 `binaries/ffmpeg-<target>` / `ffprobe-<target>` 을
      # 요구한다. 로컬 `npm run tauri:build` 는 setup:ffmpeg → tauri build
      # 순서로 chained 되어있지만 tauri-action 은 그 chain 을 건너뛰고 곧장
      # `tauri build` 만 호출하므로 여기서 명시적으로 한 번 더 받아둔다.
      # matrix.ffmpeg_target 으로 host 와 다른 cross-target 도 정확히 지정.
      - name: Download bundled ffmpeg/ffprobe
        env:
          FFMPEG_TARGET: ${{ matrix.ffmpeg_target }}
        run: npm run setup:ffmpeg

      # Speaker diarization ONNX 모델 (segmentation-3.0, wespeaker CAM++).
      # tauri.conf.json 의 bundle.resources 에 등록되어 빌드 타임에 file 존재
      # 필수 — 누락 시 .app 에 모델 없이 ship 되어 화자 분리 100% fail.
      # setup:ffmpeg 와 동일하게 tauri-action 이 setup:all chain 우회하므로
      # 여기서 명시 다운로드.
      - name: Download speaker diarization models
        run: npm run setup:diarize

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'MarkMind v__VERSION__'
          releaseBody: |
            ## MarkMind v__VERSION__

            macOS용 마크다운 에디터입니다.

            ### 다운로드
            - **Apple Silicon (M1/M2/M3/M4):** `.dmg` (aarch64)
            - **Intel Mac:** `.dmg` (x86_64)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
